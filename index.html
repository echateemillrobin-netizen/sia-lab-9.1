<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Job Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Tech Careers Portal</h1>
        <p>Find your next role in Information Technology</p>
    </div>

    <div class="container">
        <div id="job-container">
            <div id="loading">Fetching available jobs...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pdchktposfahkeuurbph.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_p5Ja7J5bWvN9QgkP5vrX8Q_SdrWv2H1';

        fetch(`${SUPABASE_URL}/rest/v1/jobs`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        })
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('job-container');
            container.innerHTML = ''; 
            
            if (data.error || data.message) {
                container.innerHTML = `<p style="color: red; text-align: center;">Error loading data: ${data.message || data.error.message}</p>`;
                return;
            }

            data.forEach(job => {
                const jobElement = document.createElement('div');
                jobElement.className = 'job-card';
                
                const formattedSalary = new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(job.salary);

                jobElement.innerHTML = `
                    <h3 class="job-title">${job.position}</h3>
                    <div class="job-meta">
                        <span>💰 ${formattedSalary} / month</span>
                        <span>📅 Closes: ${job.ends_at}</span>
                    </div>
                    <a href="job.html?id=${job.id}" class="view-btn">View Details & Apply</a>
                `;
                container.appendChild(jobElement);
            });
        })
        .catch(err => {
            document.getElementById('job-container').innerHTML = '<p style="color: red; text-align: center;">Failed to load jobs. Check your internet connection.</p>';
        });
    </script>
</body>
</html>
