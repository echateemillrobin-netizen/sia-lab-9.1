<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" style="max-width: 800px;">
        <a href="index.html" class="back-link">← Back to all jobs</a>
        
        <div id="job-details">
            <h2 id="loading">Loading job details...</h2>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pdchktposfahkeuurbph.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_p5Ja7J5bWvN9QgkP5vrX8Q_SdrWv2H1';

        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        const detailsContainer = document.getElementById('job-details');

        if (jobId) {
            fetch(`${SUPABASE_URL}/rest/v1/jobs?id=eq.${jobId}`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            })
            .then(res => res.json())
            .then(data => {
                if(data.length > 0) {
                    const job = data[0];
                    const formattedSalary = new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(job.salary);

                    detailsContainer.innerHTML = `
                        <div class="details-card">
                            <h1 class="details-title">${job.position}</h1>
                            
                            <div class="tags-container">
                                <span class="job-tag">💰 ${formattedSalary}</span>
                                <span class="job-tag urgent">📅 Closes: ${job.ends_at}</span>
                            </div>
                            
                            <h3 class="section-title">About the Role</h3>
                            <div class="job-desc">
                                <p>${job.description}</p>
                            </div>
                            
                            <button class="apply-btn" onclick="alert('Application submitted! (Optional Dropbox integration goes here)')">Apply Now</button>
                        </div>
                    `;
                } else {
                    detailsContainer.innerHTML = '<h2 style="color: red; text-align:center;">Job not found.</h2>';
                }
            })
            .catch(err => {
                detailsContainer.innerHTML = '<h2 style="color: red; text-align:center;">Failed to load job details.</h2>';
            });
        } else {
            detailsContainer.innerHTML = '<h2 style="color: red; text-align:center;">No job selected.</h2>';
        }
    </script>
</body>
</html>
